<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Saturnus v4: GOD MODE - GPGPU Shaders</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 30px; left: 30px; pointer-events: none; z-index: 10; border-left: 2px solid #00ffff; padding-left: 15px; text-shadow: 0 0 5px rgba(0,255,255,0.5); }
        h1 { margin: 0; font-weight: 200; letter-spacing: 4px; font-size: 18px; color: #00ffff; }
        #status { font-size: 12px; opacity: 0.8; margin-top: 5px; color: #aaa; }
        
        #video-container { position: absolute; bottom: 20px; right: 20px; width: 180px; height: 135px; transform: scaleX(-1); border-radius: 12px; overflow: hidden; border: 1px solid rgba(0,255,255,0.2); box-shadow: 0 5px 15px rgba(0,0,0,0.5); opacity: 0.6; transition: opacity 0.3s; }
        #video-container:hover { opacity: 1; }
        #input_video { display: none; }
        #output_canvas { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>SATURNUS v4 [GOD MODE]</h1>
        <p style="font-size: 10px; color: #555;">GPGPU Physics & Dual-Hand Shaders</p>
        <p id="status">Menginisialisasi GPU...</p>
    </div>
    <video id="input_video"></video>
    <div id="video-container"><canvas id="output_canvas"></canvas></div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/misc/GPUComputationRenderer.js"></script>

    <script id="computeShaderPosition" type="x-shader/x-fragment">
        uniform float time;
        uniform float delta;
        uniform vec3 handGravityPos; // Posisi Tangan Kanan (Gravitasi)
        uniform bool isFistMode;      // Tangan Kiri Mengepal (Ledakan)
        uniform float explosionForce;

        void main() {
            vec2 uv = gl_FragCoord.xy / resolution.xy;
            vec4 tmpPos = texture2D( texturePosition, uv );
            vec3 pos = tmpPos.xyz;
            float phase = tmpPos.w; // Simpan fase asli/tipe partikel

            // Data Awal Partikel (Original Sphere/Ring)
            vec3 originalPos = texture2D( texturePosition, uv ).xyz; 

            // --- LOGIKA FISIKA ---
            
            // 1. Gravitasi Tangan Kanan (Ditarik ke Tangan)
            vec3 dirToHand = handGravityPos - pos;
            float distToHand = length(dirToHand);
            if(distToHand > 0.1) {
                pos += normalize(dirToHand) * (0.02 / (distToHand + 0.5)); // Tarikan halus
            }

            // 2. Ledakan Tangan Kiri (Mengepal)
            if(isFistMode) {
                vec3 dirFromCenter = normalize(pos);
                pos += dirFromCenter * explosionForce * delta * 15.0; // Ledakan cepat
            } else {
                // 3. Gravitasi Alami (Ditarik kembali ke bentuk asli)
                vec3 dirToOriginal = originalPos - pos;
                float distToOriginal = length(dirToOriginal);
                if(distToOriginal > 0.01) {
                    pos += dirToOriginal * 0.03; // Tarikan kembali
                }
            }

            // Sedikit rotasi alami
            float angle = 0.002 * delta * phase; 
            mat3 rotY = mat3(
                cos(angle), 0.0, sin(angle),
                0.0, 1.0, 0.0,
                -sin(angle), 0.0, cos(angle)
            );
            pos = rotY * pos;

            gl_FragColor = vec4( pos, phase );
        }
    </script>

    <script id="particleVertexShader" type="x-shader/x-vertex">
        uniform sampler2D texturePosition;
        uniform float time;
        varying vec4 vColor;
        varying float vType; // Sphere (0) atau Ring (1)

        void main() {
            vec4 tmpPos = texture2D( texturePosition, uv );
            vec3 pos = tmpPos.xyz;
            vType = tmpPos.w; // Ambil tipe dari W

            // Warna berdasarkan posisi dan tipe
            vec3 colorSphere = vec3(1.0, 0.8, 0.0); // Gold
            vec3 colorRing = vec3(0.0, 1.0, 1.0);   // Cyan
            
            vec3 finalColor = mix(colorSphere, colorRing, vType);
            vColor = vec4(finalColor, 0.9);

            // Ukuran berdasarkan jarak kamera dan waktu (pulsing)
            vec4 mvPosition = modelViewMatrix * vec4( pos, 1.0 );
            gl_PointSize = (10.0 / -mvPosition.z) * (1.0 + 0.2 * sin(time * 3.0 + pos.x));
            gl_Position = projectionMatrix * mvPosition;
        }
    </script>

    <script id="particleFragmentShader" type="x-shader/x-fragment">
        varying vec4 vColor;
        
        void main() {
            // Membuat bentuk lingkaran kustom (glow)
            float dist = length(gl_PointCoord - vec2(0.5));
            if (dist > 0.5) discard; // Potong di luar lingkaran

            // Gradien glow lembut
            float alpha = 1.0 - smoothstep(0.0, 0.5, dist);
            gl_FragColor = vec4(vColor.rgb, vColor.a * alpha);
        }
    </script>

    <script>
        // --- CONFIG ---
        const WIDTH = 256; // Tekstur GPGPU (WIDTH * WIDTH = Jumlah Partikel, ~65k)
        const PARTICLES = WIDTH * WIDTH;
        const PARAMS = {
            planetRadius: 4,
            ringInnerRadius: 5.5,
            ringOuterRadius: 10,
            explosionForce: 0.15
        };

        // --- THREE.JS SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 5, 25);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const mainGroup = new THREE.Group();
        scene.add(mainGroup);

        // --- GPGPU SETUP ---
        const gpuCompute = new THREE.GPUComputationRenderer(WIDTH, WIDTH, renderer);
        
        // Buat tekstur posisi awal
        const dtPosition = gpuCompute.createTexture();
        fillPositionTexture(dtPosition);

        // Tambahkan shader computation
        const positionVariable = gpuCompute.addVariable("texturePosition", document.getElementById('computeShaderPosition').textContent, dtPosition);
        
        // Set Uniforms (Variabel yang dikirim dari JS ke Shader)
        positionVariable.material.uniforms.time = { value: 0.0 };
        positionVariable.material.uniforms.delta = { value: 0.0 };
        positionVariable.material.uniforms.handGravityPos = { value: new THREE.Vector3(0,0,0) };
        positionVariable.material.uniforms.isFistMode = { value: false };
        positionVariable.material.uniforms.explosionForce = { value: PARAMS.explosionForce };

        // Inisialisasi GPGPU
        const error = gpuCompute.init();
        if (error !== null) { console.error(error); }


        // --- PARTICLE OBJECT SETUP (Menggunakan Shaders Kustom) ---
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLES * 3);
        const uvs = new Float32Array(PARTICLES * 2);
        
        // Isi UV agar setiap partikel tahu koordinat tekstur GPGPU-nya
        for (let i = 0; i < PARTICLES; i++) {
            uvs[i * 2] = (i % WIDTH) / WIDTH;
            uvs[i * 2 + 1] = Math.floor(i / WIDTH) / WIDTH;
        }
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));

        const particleMaterial = new THREE.ShaderMaterial({
            uniforms: {
                texturePosition: { value: null }, // Akan diisi hasil GPGPU
                time: { value: 0.0 }
            },
            vertexShader: document.getElementById('particleVertexShader').textContent,
            fragmentShader: document.getElementById('particleFragmentShader').textContent,
            blending: THREE.AdditiveBlending,
            transparent: true,
            depthWrite: false
        });

        const particleSystem = new THREE.Points(geometry, particleMaterial);
        particleSystem.rotation.x = Math.PI / 6; // Kemiringan awal Saturnus
        mainGroup.add(particleSystem);


        // --- LOGIKA SENSOR TANGAN DUA TANGAN (MEDIAPIPE) ---
        let handStatus = "Mencari Tangan...";
        let handGravityPos = new THREE.Vector3(0,0,0);
        let isFistMode = false;

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.8 });

        hands.onResults(res => {
            const statusEl = document.getElementById('status');
            let rightHandDetected = false;
            let leftHandFist = false;

            if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
                // Iterasi setiap tangan yang terdeteksi
                res.multiHandLandmarks.forEach((marks, index) => {
                    const label = res.multiHandedness[index].label; // "Left" atau "Right"

                    if (label === "Right") {
                        // TANGAN KANAN: Tarikan Gravitasi (Pusat di Telapak Tangan, Landmark 0)
                        // Konversi koordinat [0,1] ke ruang 3D Three.js
                        handGravityPos.x = (marks[0].x - 0.5) * 30; // Sensitivitas horizontal
                        handGravityPos.y = -(marks[0].y - 0.5) * 20; // Sensitivitas vertikal
                        handGravityPos.z = (marks[0].z) * 10;       // Kedalaman
                        rightHandDetected = true;
                    }

                    if (label === "Left") {
                        // TANGAN KIRI: Supernova Explosion (Cek Mengepal)
                        // Jarak rata-rata ujung jari ke telapak
                        const fingerTips = [8, 12, 16, 20];
                        let distSum = 0;
                        for(let tip of fingerTips) {
                            distSum += Math.sqrt(Math.pow(marks[tip].x - marks[0].x, 2) + Math.pow(marks[tip].y - marks[0].y, 2));
                        }
                        if (distSum / 4 < 0.15) { leftHandFist = true; }
                    }
                });

                // Update Status UI & Variabel GPGPU
                if (rightHandDetected) {
                    positionVariable.material.uniforms.handGravityPos.value.copy(handGravityPos);
                    statusEl.innerText = "Tangan Kanan: Gravitasi Kustom Aktif";
                    statusEl.style.color = "#00ffff";
                } else {
                    // Kembalikan ke pusat jika tangan kanan hilang
                    positionVariable.material.uniforms.handGravityPos.value.set(0,0,0);
                }

                if (leftHandFist) {
                    positionVariable.material.uniforms.isFistMode.value = true;
                    statusEl.innerText += " | Tangan Kiri: SUPERNOVA!";
                    statusEl.style.color = "#ff4444";
                } else {
                    positionVariable.material.uniforms.isFistMode.value = false;
                    if(rightHandDetected) statusEl.innerText = "Tangan Kanan: Gravitasi Kustom Aktif";
                }
            } else {
                statusEl.innerText = "Tangan tidak terdeteksi";
                statusEl.style.color = "#aaa";
                positionVariable.material.uniforms.handGravityPos.value.set(0,0,0);
                positionVariable.material.uniforms.isFistMode.value = false;
            }
        });

        const videoElement = document.getElementById('input_video');
        const cameraDevice = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        cameraDevice.start();


        // --- RENDER LOOP & FISIKA ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // 1. Update GPGPU Uniforms
            positionVariable.material.uniforms.time.value = time;
            positionVariable.material.uniforms.delta.value = delta;

            // 2. Jalankan Komputasi GPU
            gpuCompute.compute();

            // 3. Ambil Hasil Komputasi (Tekstur Posisi Baru) dan Kirim ke Material Partikel
            particleMaterial.uniforms.texturePosition.value = gpuCompute.getCurrentRenderTarget(positionVariable).texture;
            particleMaterial.uniforms.time.value = time;

            // 4. Rotasi Otomatis Saturnus
            if(!positionVariable.material.uniforms.isFistMode.value) {
                particleSystem.rotation.y += 0.001;
            }

            renderer.render(scene, camera);
        }
        animate();


        // --- HELPER FUNCTIONS ---
        // Mengisi Tekstur GPGPU dengan Posisi Awal Saturnus
        function fillPositionTexture(texture) {
            const data = texture.image.data;
            for (let i = 0; i < PARTICLES; i++) {
                let x, y, z, r, angle, type;
                
                // Setengah Partikel untuk Planet, Setengah untuk Cincin
                if (i < PARTICLES / 2) { // SPHERE (PLANET)
                    const u = Math.random(), v = Math.random();
                    const theta = 2 * Math.PI * u;
                    const phi = Math.acos(2 * v - 1);
                    r = PARAMS.planetRadius * Math.pow(Math.random(), 0.7);
                    x = r * Math.sin(phi) * Math.cos(theta);
                    y = r * Math.sin(phi) * Math.sin(theta);
                    z = r * Math.cos(phi);
                    type = 0; // Sphere
                } else { // RING (CINCN)
                    angle = Math.random() * Math.PI * 2;
                    r = PARAMS.ringInnerRadius + Math.pow(Math.random(), 0.6) * (PARAMS.ringOuterRadius - PARAMS.ringInnerRadius);
                    if (r > 7.5 && r < 7.9) r += (Math.random()-0.5) * 1.5; // Celah Cassini

                    x = Math.cos(angle) * r;
                    y = (Math.random() - 0.5) * 0.1;
                    z = Math.sin(angle) * r;
                    type = 1; // Ring
                }

                data[i * 4] = x; data[i * 4 + 1] = y; data[i * 4 + 2] = z;
                data[i * 4 + 3] = type; // Simpan tipe partikel di W (fase)
            }
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
