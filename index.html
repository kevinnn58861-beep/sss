<!DOCTYPE html>
<html>
<head>
    <title>3D Hand Sensor: Saturnus Particle</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #fff; font-family: sans-serif; }
        #video-container { position: absolute; bottom: 10px; right: 10px; width: 150px; transform: scaleX(-1); opacity: 0.5; border: 2px solid #555; }
        #loading-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; }
    </style>
</head>
<body>
    <div id="loading-text">Menyiapkan Kamera...</div>
    <video id="input_video" style="display:none;"></video>
    <div id="video-container"><canvas id="output_canvas" style="width:100%"></canvas></div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- 1. SETTING UTAMA THREE.JS ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        camera.position.z = 12;
        camera.position.y = 2; // Sedikit sudut pandang atas

        // Wadah utama untuk seluruh model Saturnus agar bisa diputar bersama
        const saturnSystem = new THREE.Group();
        scene.add(saturnSystem);

        // --- 2. PARTIKEL PLANET (BOLA) ---
        const planetParams = { count: 8000, radius: 3 };
        const planetGeometry = new THREE.BufferGeometry();
        const planetPositions = new Float32Array(planetParams.count * 3);
        const planetColors = new Float32Array(planetParams.count * 3);

        const coreColor = new THREE.Color(0xFFD700); // Gold
        const outerColor = new THREE.Color(0xD2B48C); // Tan/Krem

        for (let i = 0; i < planetParams.count; i++) {
            // Distribusi Spherical Uniform
            const u = Math.random();
            const v = Math.random();
            const theta = 2 * Math.PI * u;
            const phi = Math.acos(2 * v - 1);
            
            const r = planetParams.radius * Math.pow(Math.random(), 1/3); // Kepadatan di pusat

            planetPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
            planetPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
            planetPositions[i * 3 + 2] = r * Math.cos(phi);

            // Gradasi warna berdasarkan radius (pusat lebih emas, luar lebih krem)
            const ratio = r / planetParams.radius;
            const finalColor = coreColor.clone().lerp(outerColor, ratio);
            planetColors[i * 3] = finalColor.r;
            planetColors[i * 3 + 1] = finalColor.g;
            planetColors[i * 3 + 2] = finalColor.b;
        }

        planetGeometry.setAttribute('position', new THREE.BufferAttribute(planetPositions, 3));
        planetGeometry.setAttribute('color', new THREE.BufferAttribute(planetColors, 3));

        const planetMaterial = new THREE.PointsMaterial({
            size: 0.04,
            vertexColors: true,
            blending: THREE.AdditiveBlending, // Efek Glowing
            transparent: true,
            depthWrite: false
        });
        const planetPoints = new THREE.Points(planetGeometry, planetMaterial);
        saturnSystem.add(planetPoints);

        // --- 3. PARTIKEL CINCIN (PIRINGAN) ---
        const ringParams = { count: 15000, innerRadius: 4, outerRadius: 8 };
        const ringGeometry = new THREE.BufferGeometry();
        const ringPositions = new Float32Array(ringParams.count * 3);
        const ringColors = new Float32Array(ringParams.count * 3);

        // Warna Cincin (Cokelat muda, emas pudar, krem)
        const ringColor1 = new THREE.Color(0xCD853F); // Peru Brown
        const ringColor2 = new THREE.Color(0xFFE4B5); // Moccasin Cream

        for (let i = 0; i < ringParams.count; i++) {
            // Distribusi Piringan Datar
            const angle = Math.random() * Math.PI * 2;
            // Membuat distribusi yang sedikit tidak merata (celah Cassini palsu)
            let r = ringParams.innerRadius + Math.sqrt(Math.random()) * (ringParams.outerRadius - ringParams.innerRadius);
            if (r > 5.8 && r < 6.2) r += (Math.random() - 0.5) * 1.5; // Celah buatan

            ringPositions[i * 3] = Math.cos(angle) * r;
            ringPositions[i * 3 + 1] = (Math.random() - 0.5) * 0.15; // Ketebalan cincin tipis
            ringPositions[i * 3 + 2] = Math.sin(angle) * r;

            // Gradasi warna cincin
            const ratio = (r - ringParams.innerRadius) / (ringParams.outerRadius - ringParams.innerRadius);
            const finalColor = ringColor1.clone().lerp(ringColor2, ratio);
            ringColors[i * 3] = finalColor.r;
            ringColors[i * 3 + 1] = finalColor.g;
            ringColors[i * 3 + 2] = finalColor.b;
        }

        ringGeometry.setAttribute('position', new THREE.BufferAttribute(ringPositions, 3));
        ringGeometry.setAttribute('color', new THREE.BufferAttribute(ringColors, 3));

        const ringMaterial = new THREE.PointsMaterial({
            size: 0.03,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            transparent: true,
            depthWrite: false,
            opacity: 0.8
        });
        const ringPoints = new THREE.Points(ringGeometry, ringMaterial);
        saturnSystem.add(ringPoints);

        // Memiringkan cincin agar terlihat realistis
        ringPoints.rotation.x = Math.PI * 0.15; 


        // --- 4. SETTING SENSOR MEDIAPIPE ---
        const videoElement = document.getElementById('input_video');
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        
        // Parameter Hands
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDistances: 0.5 });

        // Fungsi yang dipanggil saat MediaPipe mendeteksi tangan
        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                // Sembunyikan teks loading saat kamera aktif
                document.getElementById('loading-text').style.display = 'none';

                // Ambil koordinat ujung jari telunjuk (Landmark 8)
                const indexFinger = results.multiHandLandmarks[0][8];
                
                // Konversi koordinat [0, 1] ke [-1, 1]
                const handX = (indexFinger.x - 0.5) * 2;
                const handY = -(indexFinger.y - 0.5) * 2;

                // Gunakan posisi tangan untuk ROTASI Saturnus
                // handX mengontrol putaran horizontal (Y), handY mengontrol kemiringan (X)
                // Smoothening dengan lerp sederhana di dalam animate()
                targetRotationY = handX * Math.PI; // Full rotate
                targetRotationX = handY * Math.PI * 0.5; // Half rotate
            }
        });

        // Menghubungkan kamera web
        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        cameraUtils.start();


        // --- 5. ANIMASI & RENDER LOOP ---
        let currentRotationY = 0;
        let currentRotationX = 0;
        let targetRotationY = 0;
        let targetRotationX = 0;
        const lerpFactor = 0.05; // Mengontrol kelembutan gerakan (lebih kecil = lebih lambat/halus)

        function animate() {
            requestAnimationFrame(animate);

            // Rotasi konstan otomatis lambat
            saturnSystem.rotation.y += 0.001;

            // Interpolasi halus gerakan tangan
            currentRotationY += (targetRotationY - currentRotationY) * lerpFactor;
            currentRotationX += (targetRotationX - currentRotationX) * lerpFactor;

            // Terapkan rotasi tangan ke grup
            saturnSystem.rotation.y = currentRotationY;
            saturnSystem.rotation.x = currentRotationX;

            // Sedikit variasi gerakan partikel untuk efek dinamis
            planetPoints.rotation.z += 0.0005;

            renderer.render(scene, camera);
        }

        animate();

        // Menangani perubahan ukuran jendela browser
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
