<!DOCTYPE html>
<html>
<head>
    <title>Debug Sensor</title>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; overflow: hidden; }
        #log { position: absolute; top: 10px; left: 10px; z-index: 100; background: rgba(0,0,0,0.8); padding: 10px; }
        #input_video { position: absolute; bottom: 10px; right: 10px; width: 150px; transform: scaleX(-1); border: 1px solid #333; }
    </style>
</head>
<body>
    <div id="log">Status: Menunggu Kamera...</div>
    <video id="input_video" playsinline></video>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const logEl = document.getElementById('log');
        function writeLog(msg) { logEl.innerText += "\n> " + msg; console.log(msg); }

        // 1. Cek Koneksi & Library
        if (typeof Hands === 'undefined') {
            writeLog("ERROR: Library MediaPipe gagal dimuat. Cek koneksi internet!");
        }

        // 2. Inisialisasi Three.js (Sangat Sederhana)
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const geo = new THREE.SphereGeometry(5, 32, 32);
        const mat = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true });
        const sphere = new THREE.Mesh(geo, mat);
        scene.add(sphere);
        camera.position.z = 15;

        // 3. Sensor Tangan
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5 });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const pt = results.multiHandLandmarks[0][9];
                sphere.position.x = (pt.x - 0.5) * -20;
                sphere.position.y = (pt.y - 0.5) * -15;
                logEl.innerText = "Status: SENSOR AKTIF! Gerakkan Tangan.";
            }
        });

        // 4. Aktivasi Kamera dengan Catch Error
        const videoElement = document.getElementById('input_video');
        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });

        writeLog("Mencoba akses kamera...");
        cameraUtils.start()
            .then(() => writeLog("Kamera berhasil terbuka."))
            .catch(err => writeLog("KAGAL AKSES KAMERA: " + err));

        function animate() {
            requestAnimationFrame(animate);
            sphere.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
