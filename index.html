<!DOCTYPE html>
<html>
<head>
    <title>Saturnus Pro: Hand-Gesture Experience</title>
    <style>
        body { margin: 0; overflow: hidden; background: radial-gradient(circle, #000510 0%, #000 100%); color: #fff; font-family: 'Segoe UI', sans-serif; }
        #ui-overlay { position: absolute; top: 20px; left: 20px; pointer-events: none; }
        #video-container { position: absolute; bottom: 20px; right: 20px; width: 160px; height: 120px; transform: scaleX(-1); border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        h1 { margin: 0; font-weight: 200; letter-spacing: 5px; text-transform: uppercase; font-size: 18px; color: #ffd700; }
    </style>
</head>
<body>
    <div id="ui-overlay">
        <h1>Saturnus Particle System v2.0</h1>
        <p style="font-size: 12px; opacity: 0.6;">Gunakan telunjuk untuk memutar & mendorong partikel</p>
    </div>
    <video id="input_video" style="display:none;"></video>
    <div id="video-container"><canvas id="output_canvas" style="width:100%"></canvas></div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- INISIALISASI SCENE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const group = new THREE.Group();
        scene.add(group);

        // --- BACKGROUND STARFIELD ---
        const starGeo = new THREE.BufferGeometry();
        const starCoords = [];
        for(let i=0; i<10000; i++) {
            starCoords.push((Math.random()-0.5)*1500, (Math.random()-0.5)*1500, (Math.random()-0.5)*1500);
        }
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.7, transparent: true, opacity: 0.5 });
        scene.add(new THREE.Points(starGeo, starMat));

        // --- PARTIKEL SATURNUS (SHADERS-LIKE BEHAVIOR) ---
        function createParticles(count, radius, colorInner, colorOuter, isRing = false) {
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);

            for (let i = 0; i < count; i++) {
                let x, y, z, r;
                if (!isRing) { // SPHERE
                    const u = Math.random(), v = Math.random();
                    const theta = 2 * Math.PI * u, phi = Math.acos(2 * v - 1);
                    r = radius * Math.pow(Math.random(), 0.5);
                    x = r * Math.sin(phi) * Math.cos(theta);
                    y = r * Math.sin(phi) * Math.sin(theta);
                    z = r * Math.cos(phi);
                } else { // RING
                    const angle = Math.random() * Math.PI * 2;
                    r = radius + (Math.random() * 4);
                    x = Math.cos(angle) * r;
                    y = (Math.random() - 0.5) * 0.1;
                    z = Math.sin(angle) * r;
                }

                pos[i*3] = x; pos[i*3+1] = y; pos[i*3+2] = z;
                
                const mix = r / (radius + 4);
                const c = new THREE.Color(colorInner).lerp(new THREE.Color(colorOuter), mix);
                colors[i*3] = c.r; colors[i*3+1] = c.g; colors[i*3+2] = c.b;
                sizes[i] = Math.random();
            }
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            return geo;
        }

        const planetGeo = createParticles(12000, 4, 0xffaa00, 0x664422);
        const ringGeo = createParticles(25000, 5.5, 0xffdbac, 0x8b4513, true);

        const mat = new THREE.PointsMaterial({
            size: 0.05, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, depthWrite: false
        });

        const planet = new THREE.Points(planetGeo, mat);
        const ring = new THREE.Points(ringGeo, mat);
        ring.rotation.x = Math.PI / 2.5;
        group.add(planet, ring);

        camera.position.z = 15;

        // --- LOGIKA SENSOR TANGAN (MEDIAPIPE) ---
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1 });
        hands.onResults(res => {
            if (res.multiHandLandmarks && res.multiHandLandmarks[0]) {
                const p = res.multiHandLandmarks[0][8]; // Telunjuk
                targetX = (p.x - 0.5) * 25;
                targetY = -(p.y - 0.5) * 15;
            }
        });

        const videoElement = document.getElementById('input_video');
        const cameraDevice = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        cameraDevice.start();

        // --- ANIMASI ---
        function animate() {
            requestAnimationFrame(animate);

            // Interpolasi Halus Gerakan Kamera berdasarkan Tangan
            mouseX += (targetX - mouseX) * 0.05;
            mouseY += (targetY - mouseY) * 0.05;

            group.rotation.y += 0.002;
            group.position.x = mouseX * 0.2;
            group.position.y = mouseY * 0.2;
            
            // Berikan sedikit kemiringan dinamis
            group.rotation.z = mouseX * 0.05;
            group.rotation.x = -mouseY * 0.05;

            // Efek Pulsing (Berdenyut)
            const time = Date.now() * 0.001;
            mat.size = 0.04 + Math.sin(time * 2) * 0.01;

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
