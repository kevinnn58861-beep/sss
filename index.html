<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Saturnus God Mode V5</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #0ff; font-family: 'Courier New', Courier, monospace; }
        #ui { position: absolute; top: 20px; left: 20px; border-left: 3px solid #0ff; padding-left: 15px; pointer-events: none; }
        #video-container { position: absolute; bottom: 20px; right: 20px; width: 200px; transform: scaleX(-1); border: 1px solid #333; border-radius: 10px; overflow: hidden; }
        .instruksi { font-size: 12px; color: #888; }
    </style>
</head>
<body>
    <div id="ui">
        <h2 id="status">INITIALIZING SENSORS...</h2>
        <div class="instruksi">
            - Jari Telunjuk: SUPERNOVA<br>
            - Jari Tengah: HELLO WORLD<br>
            - Jari Manis: PLANE MODE<br>
            - Jempol + Kelingking: ZOOM
        </div>
    </div>
    <video id="input_video" style="display:none"></video>
    <div id="video-container"><canvas id="output_canvas" style="width:100%"></canvas></div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const group = new THREE.Group();
        scene.add(group);

        const PARTICLE_COUNT = 15000;
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const targetPos = new Float32Array(PARTICLE_COUNT * 3);
        const colors = new Float32Array(PARTICLE_COUNT * 3);
        const velocities = new Float32Array(PARTICLE_COUNT * 3);

        // --- GENERATE INITIAL SATURNUS SHAPE ---
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            let x, y, z;
            if (i < 8000) { // Bola Planet
                const u = Math.random(), v = Math.random();
                const theta = 2 * Math.PI * u, phi = Math.acos(2 * v - 1);
                const r = 4 * Math.pow(Math.random(), 0.5);
                x = r * Math.sin(phi) * Math.cos(theta);
                y = r * Math.sin(phi) * Math.sin(theta);
                z = r * Math.cos(phi);
            } else { // Cincin
                const angle = Math.random() * Math.PI * 2;
                const r = 6 + Math.random() * 4;
                x = Math.cos(angle) * r;
                y = (Math.random() - 0.5) * 0.2;
                z = Math.sin(angle) * r;
            }
            positions[i*3] = x; positions[i*3+1] = y; positions[i*3+2] = z;
            targetPos[i*3] = x; targetPos[i*3+1] = y; targetPos[i*3+2] = z;
            
            const col = new THREE.Color(i < 8000 ? 0xffcc00 : 0x00ffff);
            colors[i*3] = col.r; colors[i*3+1] = col.g; colors[i*3+2] = col.b;
        }

        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        const mat = new THREE.PointsMaterial({ size: 0.06, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending });
        const points = new THREE.Points(geo, mat);
        group.add(points);

        camera.position.z = 20;

        // --- HAND LOGIC STATES ---
        let mode = "SATURN"; 
        const statusEl = document.getElementById('status');

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8 });

        hands.onResults(results => {
            if (results.multiHandLandmarks && results.multiHandLandmarks[0]) {
                const lm = results.multiHandLandmarks[0];
                
                // ZOOM LOGIC (Thumb 4 to Pinky 20)
                const zoomDist = Math.hypot(lm[4].x - lm[20].x, lm[4].y - lm[20].y);
                camera.position.z = THREE.MathUtils.lerp(camera.position.z, 40 - (zoomDist * 50), 0.1);

                // MODE DETECTION
                if (lm[8].y < lm[6].y && lm[12].y > lm[10].y) {
                    mode = "SUPERNOVA";
                    statusEl.innerText = "MODE: SUPERNOVA EXPLOSION";
                } else if (lm[12].y < lm[10].y && lm[8].y > lm[6].y && lm[16].y > lm[14].y) {
                    mode = "HELLO_WORLD";
                    statusEl.innerText = "MODE: HELLO WORLD";
                } else if (lm[16].y < lm[14].y && lm[12].y > lm[10].y) {
                    mode = "PLANE";
                    statusEl.innerText = "MODE: AEROPLANE STRUCTURE";
                } else {
                    mode = "SATURN";
                    statusEl.innerText = "MODE: SATURN DEFAULT";
                }
            }
        });

        new Camera(document.getElementById('input_video'), {
            onFrame: async () => { await hands.send({image: document.getElementById('input_video')}); },
            width: 640, height: 480
        }).start();

        // --- FRAME ANIMATION ---
        function animate() {
            requestAnimationFrame(animate);
            const posAttr = geo.attributes.position.array;

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                let tx = targetPos[i*3], ty = targetPos[i*3+1], tz = targetPos[i*3+2];

                if (mode === "SUPERNOVA") {
                    posAttr[i*3] += (Math.random() - 0.5) * 2;
                    posAttr[i*3+1] += (Math.random() - 0.5) * 2;
                    posAttr[i*3+2] += (Math.random() - 0.5) * 2;
                } else if (mode === "HELLO_WORLD") {
                    // Logic sederhana membentuk grid text-like
                    tx = (i % 50) - 25; ty = Math.floor(i / 100) % 10; tz = 0;
                    posAttr[i*3] += (tx - posAttr[i*3]) * 0.1;
                    posAttr[i*3+1] += (ty - posAttr[i*3+1]) * 0.1;
                    posAttr[i*3+2] += (tz - posAttr[i*3+2]) * 0.1;
                } else if (mode === "PLANE") {
                    // Primitive Plane Shape
                    if (i < 5000) { // Badan Pesawat (Cylinder-ish)
                        tx = (Math.random() - 0.5) * 15; ty = (Math.random() - 0.5); tz = (Math.random() - 0.5);
                    } else if (i < 12000) { // Sayap
                        tx = (Math.random() - 0.5) * 4; ty = 0; tz = (Math.random() - 0.5) * 15;
                    }
                    posAttr[i*3] += (tx - posAttr[i*3]) * 0.1;
                    posAttr[i*3+1] += (ty - posAttr[i*3+1]) * 0.1;
                    posAttr[i*3+2] += (tz - posAttr[i*3+2]) * 0.1;
                } else {
                    // Kembali ke Saturnus
                    posAttr[i*3] += (tx - posAttr[i*3]) * 0.05;
                    posAttr[i*3+1] += (ty - posAttr[i*3+1]) * 0.05;
                    posAttr[i*3+2] += (tz - posAttr[i*3+2]) * 0.05;
                }
            }

            geo.attributes.position.needsUpdate = true;
            group.rotation.y += 0.002;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
