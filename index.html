<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Neural Core</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #video_container { position: absolute; bottom: 20px; right: 20px; width: 180px; border-radius: 50%; overflow: hidden; border: 2px solid #ff00ff; transform: scaleX(-1); z-index: 10; box-shadow: 0 0 15px #ff00ff; }
        video { width: 100%; display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; border: 1px solid #00f2ff; pointer-events: none; z-index: 10; }
        .neon { color: #00f2ff; text-shadow: 0 0 5px #00f2ff; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui">
    <h2 style="margin:0 0 10px 0; color:#ff00ff;">NEURAL CORE</h2>
    <p><span class="neon">Gerakkan:</span> Navigasi Core</p>
    <p><span class="neon">Cubit:</span> Kompresi Energi (Zoom)</p>
    <p><span class="neon">Kepal:</span> Singularity Mode</p>
    <p style="font-size: 11px; color: #888;">Quantum Simulation Active</p>
</div>

<div id="video_container">
    <video id="input_video"></video>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// --- 1. CORE SETUP ---
const particleCount = 120000;
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

camera.position.z = 30;

// --- 2. QUANTUM GEOMETRY ---
const geometry = new THREE.BufferGeometry();
const posArray = new Float32Array(particleCount * 3);
const colArray = new Float32Array(particleCount * 3);
const initialPos = new Float32Array(particleCount * 3); // Simpan posisi asli

for (let i = 0; i < particleCount; i++) {
    const idx = i * 3;
    
    // Bentuk Dasar: Double Torus (Donat Ganda)
    const u = Math.random() * Math.PI * 2;
    const v = Math.random() * Math.PI * 2;
    const r = 8 + (Math.random() - 0.5) * 2;
    
    posArray[idx] = (r + 3 * Math.cos(v)) * Math.cos(u);
    posArray[idx+1] = (r + 3 * Math.cos(v)) * Math.sin(u);
    posArray[idx+2] = 3 * Math.sin(v);

    initialPos[idx] = posArray[idx];
    initialPos[idx+1] = posArray[idx+1];
    initialPos[idx+2] = posArray[idx+2];

    // Warna: Cyan ke Magenta Gradient
    const color = new THREE.Color();
    color.setHSL(0.5 + (Math.random() * 0.2), 1, 0.5); 
    colArray[idx] = color.r; colArray[idx+1] = color.g; colArray[idx+2] = color.b;
}

geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
geometry.setAttribute('color', new THREE.BufferAttribute(colArray, 3));

const material = new THREE.PointsMaterial({
    size: 0.06,
    vertexColors: true,
    blending: THREE.AdditiveBlending,
    transparent: true,
    opacity: 0.7
});

const points = new THREE.Points(geometry, material);
scene.add(points);

// --- 3. SENSOR & INTERACTION ---
let targetScale = 1;
let isFist = false;
let mouseX = 0, mouseY = 0;

const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.7 });

hands.onResults((res) => {
    if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
        const pts = res.multiHandLandmarks[0];
        
        // Follow Hand
        mouseX = (pts[9].x - 0.5) * -50;
        mouseY = (pts[9].y - 0.5) * -40;

        // Pinch to Zoom
        const d = Math.hypot(pts[4].x - pts[8].x, pts[4].y - pts[8].y);
        targetScale = THREE.MathUtils.clamp(d * 8, 0.5, 5);

        // Fist Detection (Singularity)
        const fistD = Math.hypot(pts[8].x - pts[0].x, pts[8].y - pts[0].y);
        isFist = fistD < 0.25;
    }
});

new Camera(document.getElementById('input_video'), {
    onFrame: async () => { await hands.send({image: document.getElementById('input_video')}); },
    width: 640, height: 480
}).start();

// --- 4. PHYSICS ANIMATION LOOP ---
let time = 0;
function animate() {
    requestAnimationFrame(animate);
    time += 0.05;

    const pos = geometry.attributes.position.array;
    
    // Smooth Follow
    points.position.x += (mouseX - points.position.x) * 0.1;
    points.position.y += (mouseY - points.position.y) * 0.1;
    points.scale.setScalar(THREE.MathUtils.lerp(points.scale.x, targetScale, 0.1));

    for (let i = 0; i < particleCount; i++) {
        const idx = i * 3;
        
        if (isFist) {
            // Singularity Mode: Semua tertarik ke tengah
            pos[idx] *= 0.8;
            pos[idx+1] *= 0.8;
            pos[idx+2] *= 0.8;
        } else {
            // Neural Pulse: Bergetar dan kembali ke bentuk semula
            const noise = Math.sin(time + i * 0.1) * 0.1;
            pos[idx] += (initialPos[idx] - pos[idx]) * 0.1 + noise;
            pos[idx+1] += (initialPos[idx+1] - pos[idx+1]) * 0.1 + noise;
            pos[idx+2] += (initialPos[idx+2] - pos[idx+2]) * 0.1 + noise;
        }
    }

    geometry.attributes.position.needsUpdate = true;
    points.rotation.z += 0.002;
    points.rotation.y += 0.005;

    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
